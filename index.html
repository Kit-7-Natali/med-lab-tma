<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedLab Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --secondary: #28a745; --bg: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: var(--bg); color: #333; }
        
        /* Headers */
        .header { background: white; padding: 15px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { margin: 0; font-size: 18px; color: var(--primary); }

        /* Catalog */
        .container { padding: 15px; padding-bottom: 120px; }
        .category-block { margin-bottom: 10px; background: white; border-radius: 10px; overflow: hidden; }
        .category-title { padding: 15px; background: #e1f5fe; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .items-list { display: none; }
        .item { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-size: 14px; margin-bottom: 4px; }
        .item-meta { font-size: 11px; color: #888; }
        .price-tag { font-weight: bold; color: var(--primary); white-space: nowrap; }

        /* Buttons */
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-left: 10px; cursor: pointer; }
        .btn-add.in-cart { background: #ccc; }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Cart Panel */
        .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); display: none; }
        .cart-summary { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .btn-checkout { background: var(--secondary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Order Form */
        #order-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 100; padding: 20px; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .order-review { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }
        .back-link { color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 15px; font-size: 14px; cursor: pointer; }
        .error { color: red; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="catalog-screen">
    <div class="header">
        <h2>🏥 Лабораторія: Прайс</h2>
    </div>
    <div class="container" id="price-container"></div>
    
    <div class="cart-panel" id="cart-panel">
        <div class="cart-summary">
            <span>Обрано: <b id="cart-count">0</b></span>
            <span>До сплати: <b id="cart-total">0</b> грн</span>
        </div>
        <button class="btn-checkout" onclick="openOrderForm()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>
</div>

<div id="order-screen">
    <a class="back-link" onclick="closeOrderForm()">← Повернутися до вибору</a>
    <h2>📝 Дані пацієнта</h2>
    <div class="order-review" id="order-review"></div>
    
    <div class="form-group">
        <label>Стать</label>
        <select id="p_gender" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;">
            <option value="Не вказано">Оберіть стать...</option>
            <option value="Чоловіча">Чоловіча</option>
            <option value="Жіноча">Жіноча</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>ПІБ пацієнта</label>
        <input type="text" id="p_name" placeholder="Іванов Іван Іванович">
        <div class="error" id="error-name"></div>
    </div>
    
    <div class="form-group">
        <label>Дата народження</label>
        <input type="date" id="p_dob">
        <div class="error" id="error-dob"></div>
    </div>
    
    <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="p_phone" placeholder="+380...">
        <div class="error" id="error-phone"></div>
    </div>
    
    <button class="btn-checkout" onclick="submitFinalOrder()">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>
</div>

<script>
    const SAMPLING_COST = 60;
    let cart = [];

    // БАЗА ДАНИХ (ПРАЙС)
    const priceList = [
        {
            category: "🩸 Загальноклінічні дослідження",
            items: [
                { id: "101", name: "Загальний аналіз крові (ЗАК)", price: 250, bm: "Кров венозна" },
                { id: "102", name: "Аналіз сечі за Нечипоренком", price: 180, bm: "Сеча" },
                { id: "103", name: "Глюкоза крові", price: 150, bm: "Кров капілярна" }
            ]
        },
        {
            category: "🧪 Біохімічна панель",
            items: [
                { id: "201", name: "АЛТ / АСТ", price: 210, bm: "Кров венозна" },
                { id: "202", name: "Білірубін загальний", price: 120, bm: "Кров венозна" },
                { id: "203", name: "Креатинін", price: 130, bm: "Кров венозна" }
            ]
        }
    ];

    function renderPrice() {
        const container = document.getElementById('price-container');
        priceList.forEach((cat, idx) => {
            let html = `
                <div class="category-block">
                    <div class="category-title" onclick="toggleCat('cat-${idx}')">${cat.category} <span>▼</span></div>
                    <div id="cat-${idx}" class="items-list">
            `;
            cat.items.forEach(item => {
                html += `
                    <div class="item">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">ID: ${item.id} | ${item.bm}</div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <div class="price-tag">${item.price} ₴</div>
                            <button class="btn-add" id="btn-${item.id}" onclick="toggleCart('${item.id}', '${item.name}', ${item.price}, '${item.bm}')">+</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML += html + `</div></div>`;
        });
    }

    function toggleCart(id, name, price, bm) {
        const idx = cart.findIndex(i => i.id === id);
        const btn = document.getElementById('btn-' + id);
        
        if (idx > -1) {
            cart.splice(idx, 1);
            btn.innerText = '+';
            btn.classList.remove('in-cart');
        } else {
            cart.push({ id, name, price, bm });
            btn.innerText = '✓';
            btn.classList.add('in-cart');
        }
        updateCartUI();
    }

    function calculateTotal() {
        let itemsSum = cart.reduce((s, i) => s + i.price, 0);
        let hasBlood = cart.some(i => i.bm.toLowerCase().includes("кров"));
        return {
            itemsSum: itemsSum,
            sampling: hasBlood ? SAMPLING_COST : 0,
            total: itemsSum + (hasBlood ? SAMPLING_COST : 0)
        };
    }

    function updateCartUI() {
        const panel = document.getElementById('cart-panel');
        if (cart.length > 0) {
            panel.style.display = 'block';
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = calculateTotal().total;
        } else {
            panel.style.display = 'none';
        }
    }

    function openOrderForm() {
        // ✅ ПЕРЕВІРКА НА ПУСТИЙ КОШИК
        if (cart.length === 0) {
            alert("Обріть хоча б один аналіз!");
            return;
        }

        document.getElementById('catalog-screen').style.display = 'none';
        document.getElementById('order-screen').style.display = 'block';
        
        const res = calculateTotal();
        let reviewHtml = `<b>Обрані тести:</b><br>`;
        cart.forEach(i => reviewHtml += `- ${i.name} (${i.price} ₴)<br>`);
        if (res.sampling > 0) reviewHtml += `<br><b>Взяття б/м:</b> ${res.sampling} ₴`;
        reviewHtml += `<br><br><b>РАЗОМ: ${res.total} ₴</b>`;
        
        document.getElementById('order-review').innerHTML = reviewHtml;
    }

    function closeOrderForm() {
        document.getElementById('catalog-screen').style.display = 'block';
        document.getElementById('order-screen').style.display = 'none';
        clearErrors();
    }

    // ✅ ВАЛІДАЦІЯ
    function validateForm(name, dob, phone, gender) {
        let isValid = true;
        clearErrors();

        if (!name || name.trim().length < 3) {
            document.getElementById('error-name').innerText = "Введіть повне ім'я (мін. 3 символи)";
            isValid = false;
        }

        if (!dob) {
            document.getElementById('error-dob').innerText = "Виберіть дату народження";
            isValid = false;
        } else {
            const dobDate = new Date(dob);
            const today = new Date();
            const age = today.getFullYear() - dobDate.getFullYear();
            if (age < 0 || age > 120) {
                document.getElementById('error-dob').innerText = "Введіть коректну дату";
                isValid = false;
            }
        }

        if (!phone || !/^\+?380\d{9}$/.test(phone.replace(/\D/g, '380'))) {
            document.getElementById('error-phone').innerText = "Введіть коректний номер (приклад: +380501234567)";
            isValid = false;
        }

        if (gender === "Не вказано") {
            alert("Виберіть стать!");
            isValid = false;
        }

        return isValid;
    }

    function clearErrors() {
        document.getElementById('error-name').innerText = '';
        document.getElementById('error-dob').innerText = '';
        document.getElementById('error-phone').innerText = '';
    }

    // ✅ ВИПРАВЛЕНА ФУНКЦІЯ БЕЗ ДУБЛЮВАННЯ
    function submitFinalOrder() {
        const btn = document.querySelector("#order-screen .btn-checkout");
        
        if (btn.disabled) return; 

        const name = document.getElementById('p_name').value;
        const dob = document.getElementById('p_dob').value;
        const phone = document.getElementById('p_phone').value;
        const gender = document.getElementById('p_gender').value;

        // ✅ ВАЛІДАЦІЯ
        if (!validateForm(name, dob, phone, gender)) {
            return;
        }

        // ✅ БЛОКУЄМО КНОПКУ
        btn.disabled = true;
        btn.innerText = "Відправка...";
        btn.style.opacity = "0.5";

        const res = calculateTotal();
        const finalData = {
            patient: { name, dob, phone, gender },
            analysis_ids: cart.map(i => i.id).join(", "),
            analysis_names: cart.map(i => i.name).join(", "),
            total_price: res.total
        };

        try {
            Telegram.WebApp.sendData(JSON.stringify(finalData));
            
            // ✅ ЗАКРИВАЄМО ЧЕРЕЗ ПАУЗУ
            setTimeout(() => {
                Telegram.WebApp.close();
            }, 500);
        } catch (error) {
            console.error("Помилка відправки:", error);
            btn.disabled = false;
            btn.innerText = "ПІДТВЕРДИТИ ЗАМОВЛЕННЯ";
            btn.style.opacity = "1";
            alert("⚠️ Помилка відправки даних. Спробуйте ще раз.");
        }
    }

    // ✅ ІНІЦІАЛІЗАЦІЯ
    renderPrice();
    Telegram.WebApp.expand();
    toggleCat('cat-0');
    
    function toggleCat(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
